server:
  port: 8080

spring:
  application:
    name: weighing-station
  datasource:
    # File-based H2 DB stored next to the JAR, survives restarts.
    url: jdbc:h2:file:./data/weighing-station;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: false   # set true temporarily if you need to inspect the local DB

# ---- Scale configuration ----
scale:
  mode: simulated        # simulated | serial | modbus  (switch to "serial" or "modbus" once hardware is wired up)
  comPort: COM3
  baudRate: 9600
  modbusHost: 192.168.1.50
  modbusPort: 502
  modbusRegister: 0
  tareWeight: 0.0
  unit: KG

# ---- SAP S/4HANA Public Cloud configuration ----
# Fill these in from your Communication Arrangement (Communication Systems /
# Communication User / Communication Arrangement apps in S/4HANA).
sap:
  baseUrl: https://your-tenant.s4hana.cloud.sap
  confirmationServicePath: /sap/opu/odata/sap/API_PRODUCTION_ORDER_CONFIRMATION_2_SRV/A_ProductionOrderConfirmation2
  authType: basic          # basic | oauth2
  username: WEIGH_STATION_USER
  password: CHANGE_ME       # better: keep this out of the packaged JAR - see README on Jasypt encryption
  tokenUrl: https://your-tenant.authentication.eu10.hana.ondemand.com/oauth/token
  clientId: ""
  clientSecret: ""
  connectTimeoutMs: 5000
  readTimeoutMs: 15000
  retryIntervalMs: 120000   # how often the retry scheduler runs, in ms (2 min default)

logging:
  level:
    root: INFO
    com.plant.weighing: DEBUG
  file:
    name: ./logs/weighing-station.log
